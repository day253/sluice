apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "sluice.fullname" . }}-entrypoint
  labels:
    {{- include "sluice.labels" . | nindent 4 }}
data:
  entrypoint.sh: |
    #!/bin/sh
    set -e
    ORDINAL=$(echo "${POD_NAME##*-}" | grep -o '[0-9]*$' || echo "0")
    NAMESPACE="$(cat /var/run/secrets/kubernetes.io/serviceaccount/namespace)"
    API="0.0.0.0:{{ .Values.apiPort }}"
    RAFT="0.0.0.0:{{ .Values.raftPort }}"
    DATA="/data"
    TOKEN="$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)"
    SVC="https://${KUBERNETES_SERVICE_HOST}:${KUBERNETES_SERVICE_PORT}"

    resolve_service_ip() {
      SERVICE_NAME="$1"
      wget -qO- --header="Authorization: Bearer ${TOKEN}" --no-check-certificate \
        "${SVC}/api/v1/namespaces/${NAMESPACE}/services/${SERVICE_NAME}" 2>/dev/null \
        | sed -n 's/.*"clusterIP"\s*:\s*"\([0-9.]*\)".*/\1/p'
    }

    resolve_leader_ip() {
      CANDIDATE_IP="$1"
      HEALTH=$(wget -qO- "http://${CANDIDATE_IP}:{{ .Values.apiPort }}/api/v1/health" 2>/dev/null || true)
      LEADER_ADDR=$(printf '%s' "${HEALTH}" | sed -n 's/.*"leader":"\([^"]*\)".*/\1/p')
      LEADER_IP="${LEADER_ADDR%:*}"
      case "${LEADER_IP}" in
        ""|"0.0.0.0"|"::") return 1 ;;
      esac
      printf '%s' "${LEADER_IP}"
    }

    SELF_IP=$(resolve_service_ip "${POD_NAME}-raft")
    while [ -z "$SELF_IP" ]; do
      echo "   waiting for stable Raft service IP..."
      sleep 2
      SELF_IP=$(resolve_service_ip "${POD_NAME}-raft")
    done
    RAFT_ADVERTISE="${SELF_IP}:{{ .Values.raftPort }}"

    if [ "$ORDINAL" = "0" ]; then
      echo "==> Bootstrapping as ${POD_NAME} on ${RAFT}"
      exec sluice --id="${POD_NAME}" --api="${API}" --raft="${RAFT}" \
        --raft-advertise="${RAFT_ADVERTISE}" \
        --data="${DATA}" --bootstrap --workers={{ .Values.workersPerNode }} \
        --raft-voters={{ .Values.raftVoters }} \
        --log-level={{ .Values.logLevel }}
    else
      # Existing members must start immediately after a full-cluster restart.
      # Waiting for pod 0's HTTP API here would deadlock Raft leader election.
      if [ -f "${DATA}/raft/raft-stable.db" ]; then
        echo "==> Restarting existing Raft member ${POD_NAME}"
        exec sluice --id="${POD_NAME}" --api="${API}" --raft="${RAFT}" \
          --raft-advertise="${RAFT_ADVERTISE}" \
          --data="${DATA}" --workers={{ .Values.workersPerNode }} \
          --raft-voters={{ .Values.raftVoters }} \
          --log-level={{ .Values.logLevel }}
      fi

      BOOTSTRAP_IP=$(resolve_service_ip "{{ include "sluice.fullname" . }}-0-raft")
      while [ -z "$BOOTSTRAP_IP" ]; do
        echo "   waiting for sluice-0 IP via K8s API..."
        sleep 2
        BOOTSTRAP_IP=$(resolve_service_ip "{{ include "sluice.fullname" . }}-0-raft")
      done

      JOIN_PAYLOAD=$(printf '{"node_id":"%s","raft_address":"%s","http_address":"%s","total_workers":%s}' \
        "${POD_NAME}" "${RAFT_ADVERTISE}" "${API}" "{{ .Values.workersPerNode }}")
      echo "==> Joining the current Raft leader (discovered via sluice-0)"
      for i in $(seq 1 30); do
        LEADER_IP=$(resolve_leader_ip "${BOOTSTRAP_IP}" || true)
        if [ -n "${LEADER_IP}" ] && wget -qO- \
          --header="Content-Type: application/json" \
          --post-data="${JOIN_PAYLOAD}" \
          "http://${LEADER_IP}:{{ .Values.apiPort }}/api/v1/cluster/join" 2>/dev/null; then
          echo
          break
        fi
        echo "   waiting for a reachable Raft leader... ${i}"; sleep 2
      done
      # The join request above already registered this member on the current
      # leader. Do not send a second request to the bootstrap follower; it can
      # reject the duplicate while the member is already being replicated.
      exec sluice --id="${POD_NAME}" --api="${API}" --raft="${RAFT}" \
        --raft-advertise="${RAFT_ADVERTISE}" \
        --data="${DATA}" --workers={{ .Values.workersPerNode }} \
        --raft-voters={{ .Values.raftVoters }} \
        --log-level={{ .Values.logLevel }}
    fi
