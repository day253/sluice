apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: sluiceclusters.sluice.day253.github.com
spec:
  group: sluice.day253.github.com
  names:
    kind: SluiceCluster
    listKind: SluiceClusterList
    plural: sluiceclusters
    singular: sluicecluster
    shortNames: [sc]
  scope: Namespaced
  versions:
    - name: v1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required: [replicas]
              properties:
                replicas:
                  type: integer
                  description: Fixed control/Raft replicas; never an HPA target
                  minimum: 1
                  maximum: 11
                  enum: [1, 3, 5, 7, 9, 11]
                workerReplicas:
                  type: integer
                  description: Static Worker replicas, or initial size before HPA takes ownership
                  minimum: 1
                  default: 3
                image:
                  type: string
                workersPerNode:
                  type: integer
                  default: 100
                logLevel:
                  type: string
                  enum: [debug, info, warn, error]
                persistence:
                  type: object
                  properties:
                    size:
                      type: string
                resources:
                  type: object
                  properties:
                    requests:
                      type: object
                      x-kubernetes-preserve-unknown-fields: true
                    limits:
                      type: object
                      x-kubernetes-preserve-unknown-fields: true
                autoscaling:
                  type: object
                  description: Exclusive native-HPA or Sluice-workload scaling policy for the stateless Worker StatefulSet only
                  properties:
                    enabled:
                      type: boolean
                      default: false
                    mode:
                      type: string
                      enum: [hpa, workload]
                      default: hpa
                    minReplicas:
                      type: integer
                      minimum: 1
                      default: 1
                    maxReplicas:
                      type: integer
                      minimum: 1
                      default: 100
                    workload:
                      type: object
                      description: Direct Worker scaling from Sluice unfinished backlog and allocated Worker utilization
                      properties:
                        pollIntervalSeconds:
                          type: integer
                          minimum: 1
                          default: 5
                        targetBacklogPerPod:
                          type: integer
                          format: int64
                          minimum: 1
                          default: 400
                        targetWorkerUtilization:
                          type: integer
                          minimum: 1
                          maximum: 100
                          default: 70
                        targetCPUUtilization:
                          type: integer
                          minimum: 1
                          maximum: 100
                          default: 70
                        targetQueueDrainSeconds:
                          type: integer
                          minimum: 1
                          default: 30
                        targetThroughputUtilization:
                          type: integer
                          minimum: 1
                          maximum: 100
                          default: 80
                        tolerancePercent:
                          type: integer
                          minimum: 0
                          maximum: 100
                          default: 10
                        minTelemetryCoveragePercent:
                          type: integer
                          minimum: 1
                          maximum: 100
                          default: 80
                        scaleUpPercent:
                          type: integer
                          minimum: 1
                          default: 100
                        scaleUpPods:
                          type: integer
                          minimum: 1
                          default: 10
                        scaleDownPercent:
                          type: integer
                          minimum: 1
                          maximum: 100
                          default: 25
                        scaleDownStabilizationSeconds:
                          type: integer
                          minimum: 0
                          default: 300
                    metrics:
                      type: array
                      items:
                        type: object
                        x-kubernetes-preserve-unknown-fields: true
                    behavior:
                      type: object
                      x-kubernetes-preserve-unknown-fields: true
                  x-kubernetes-validations:
                    - rule: "!self.enabled || self.minReplicas <= self.maxReplicas"
                      message: minReplicas must not exceed maxReplicas
                    - rule: "!self.enabled || self.mode != 'workload' || has(self.workload)"
                      message: workload mode requires workload settings
            status:
              type: object
              properties:
                readyReplicas:
                  type: integer
                controlReadyReplicas:
                  type: integer
                workerReadyReplicas:
                  type: integer
                desiredWorkerReplicas:
                  type: integer
                leader:
                  type: string
                nodes:
                  type: array
                  items:
                    type: object
                    properties:
                      name:
                        type: string
                      status:
                        type: string
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Controls
          type: integer
          jsonPath: .spec.replicas
        - name: ControlReady
          type: integer
          jsonPath: .status.controlReadyReplicas
        - name: WorkerReady
          type: integer
          jsonPath: .status.workerReadyReplicas
        - name: WorkerDesired
          type: integer
          jsonPath: .status.desiredWorkerReplicas
        - name: Leader
          type: string
          jsonPath: .status.leader
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: tenants.sluice.day253.github.com
spec:
  group: sluice.day253.github.com
  names:
    kind: Tenant
    listKind: TenantList
    plural: tenants
    singular: tenant
    shortNames: [tnt]
  scope: Namespaced
  versions:
    - name: v1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required: [maxWorkers]
              properties:
                maxWorkers:
                  type: integer
                  minimum: 1
                clusterRef:
                  type: string
                  description: Name of SluiceCluster this tenant belongs to
            status:
              type: object
              properties:
                phase:
                  type: string
                  enum: [Active, Idle, Deleting]
                inflight:
                  type: integer
                allocatedWorkers:
                  type: integer
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: MaxWorkers
          type: integer
          jsonPath: .spec.maxWorkers
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Inflight
          type: integer
          jsonPath: .status.inflight
        - name: Cluster
          type: string
          jsonPath: .spec.clusterRef
