<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sluice Dashboard</title>
<style>
:root {
  --bg: #f5f5f5; --card: #fff; --border: #e0e0e0;
  --text: #333; --muted: #888; --accent: #2563eb;
  --green: #16a34a; --red: #dc2626; --yellow: #ca8a04;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--text); font:14px/1.5 -apple-system,sans-serif; }
header { background:var(--card); border-bottom:1px solid var(--border); padding:12px 24px; display:flex; align-items:center; gap:16px; box-shadow:0 1px 3px rgba(0,0,0,.06); }
header h1 { font-size:18px; font-weight:700; }
header .status { font-size:12px; padding:2px 10px; border-radius:10px; font-weight:600; }
.status-ok { background:#dcfce7; color:var(--green); }
.status-warn { background:#fef9c3; color:var(--yellow); }
.status-err { background:#fee2e2; color:var(--red); }
main { max-width:1400px; margin:0 auto; padding:24px; }
.grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(280px,1fr)); gap:16px; }
.card { background:var(--card); border:1px solid var(--border); border-radius:10px; padding:20px; box-shadow:0 1px 3px rgba(0,0,0,.04); }
.card h3 { font-size:12px; color:var(--muted); margin-bottom:14px; text-transform:uppercase; letter-spacing:0.8px; font-weight:600; }
.stat { display:flex; justify-content:space-between; padding:6px 0; border-bottom:1px solid var(--border); }
.stat:last-child { border-bottom:none; }
.stat .val { font-weight:700; font-size:15px; }
.val.green { color:var(--green); } .val.red { color:var(--red); }
.val.yellow { color:var(--yellow); } .val.blue { color:var(--accent); }
.nodes { display:flex; gap:8px; flex-wrap:wrap; }
.node-chip { padding:4px 14px; border-radius:14px; font-size:12px; font-weight:500; }
.node-up { background:#dcfce7; color:var(--green); }
.node-down { background:#fee2e2; color:var(--red); }
.tenant-bar { height:8px; border-radius:4px; background:var(--border); margin:4px 0; overflow:hidden; }
.tenant-bar-fill { height:100%; border-radius:4px; background:var(--accent); transition:width .4s; min-width:2px; }
.tenant-bar-fill.idle { background:var(--muted); }
.actions { display:flex; gap:8px; margin-top:16px; flex-wrap:wrap; }
.btn { padding:7px 18px; border-radius:7px; border:1px solid var(--border); background:var(--card); color:var(--text); cursor:pointer; font-size:13px; font-weight:500; }
.btn:hover { border-color:var(--accent); background:#f0f4ff; }
.btn-primary { background:var(--accent); color:#fff; border:none; }
.btn-primary:hover { opacity:.9; background:var(--accent); }
.btn-danger { background:#fff; color:var(--red); border-color:var(--red); }
.btn-danger:hover { background:#fee2e2; }
input { padding:7px 14px; border-radius:7px; border:1px solid var(--border); background:var(--card); color:var(--text); font-size:13px; width:180px; }
input:focus { outline:none; border-color:var(--accent); box-shadow:0 0 0 2px rgba(37,99,235,.15); }
.refresh { font-size:12px; color:var(--muted); }
.banner { padding:10px 16px; border-radius:8px; margin-bottom:16px; display:none; font-size:13px; }
.banner-err { background:#fee2e2; color:var(--red); display:block; }
.tenant-row { display:flex; align-items:center; gap:12px; margin-bottom:10px; }
.tenant-row .name { width:140px; font-weight:600; font-size:13px; }
.tenant-row .bar-wrap { flex:1; }
.tenant-row .count { width:120px; text-align:right; font-size:12px; color:var(--muted); }
.tag { font-size:10px; padding:1px 6px; border-radius:4px; font-weight:600; margin-left:4px; }
.tag-idle { background:#f1f5f9; color:var(--muted); }
</style>
</head>
<body>
<header>
  <span style="font-size:20px;margin-right:4px">&#9961;</span>
  <h1>Sluice</h1>
  <span id="health-badge" class="status">...</span>
  <span class="refresh" id="refresh-info"></span>
  <div style="flex:1"></div>
  <span style="color:var(--muted);font-size:12px" id="leader-info"></span>
</header>
<main>
  <div class="banner" id="error-banner"></div>

  <div class="grid" style="margin-bottom:24px">
    <div class="card">
      <h3>&#9681; Cluster</h3>
      <div class="stat"><span>Nodes</span><span class="val blue" id="node-count">-</span></div>
      <div class="stat"><span>Leader</span><span class="val" id="leader-addr" style="font-size:13px">-</span></div>
      <div class="stat"><span>Total Workers</span><span class="val blue" id="total-workers">-</span></div>
    </div>
    <div class="card">
      <h3>&#9776; Tasks</h3>
      <div class="stat"><span>Inflight</span><span class="val yellow" id="task-inflight">-</span></div>
      <div class="stat"><span>Pending</span><span class="val" id="task-pending" style="color:var(--muted)">-</span></div>
      <div class="stat"><span>Recovery</span><span class="val" id="task-recovery" style="color:#f97316">-</span></div>
    </div>
    <div class="card">
      <h3>&#9702; Tenants</h3>
      <div class="stat"><span>Active</span><span class="val green" id="tenant-active">-</span></div>
      <div class="stat"><span>Idle</span><span class="val" id="tenant-idle" style="color:var(--muted)">-</span></div>
      <div class="stat"><span>Total</span><span class="val blue" id="tenant-total">-</span></div>
    </div>
    <div class="card">
      <h3>&#9673; Nodes</h3>
      <div class="nodes" id="node-list"></div>
    </div>
  </div>

  <div class="card" style="margin-bottom:16px">
    <h3>&#9776; Worker Allocation</h3>
    <div id="tenant-bars"><span style="color:var(--muted)">Loading...</span></div>
  </div>

  <div class="card">
    <h3>&#9998; Manage Tenants</h3>
    <div class="actions">
      <input id="new-tenant-id" placeholder="tenant-id">
      <input id="new-tenant-name" placeholder="Name">
      <input id="new-tenant-workers" placeholder="Max Workers" type="number" min="1" value="50" style="width:120px">
      <button class="btn btn-primary" onclick="addTenant()">Add / Update</button>
      <button class="btn btn-danger" onclick="removeTenant()">Delete</button>
      <button class="btn" onclick="submitSample()" style="margin-left:auto">Submit Test Task</button>
    </div>
  </div>
</main>

<script>
const API = '';
let errCount = 0, healthy = true, firstLoad = true;

async function fetchJSON(path) {
  const r = await fetch(API + path);
  if (!r.ok) throw new Error(r.status);
  return r.json();
}

function setError(msg) {
  if (firstLoad) return;
  errCount++;
  if (errCount < 3) return;
  const el = document.getElementById('error-banner');
  el.textContent = msg;
  el.className = 'banner banner-err';
}

async function refresh() {
  try {
    const [health, nodes, tenants, allocs] = await Promise.all([
      fetchJSON('/api/v1/health'),
      fetchJSON('/api/v1/admin/nodes'),
      fetchJSON('/api/v1/admin/tenants'),
      fetchJSON('/api/v1/admin/allocations'),
    ]);

    errCount = 0;
    if (firstLoad) firstLoad = false;
    document.getElementById('error-banner').className = 'banner';

    // Health
    const badge = document.getElementById('health-badge');
    if (health) {
      badge.textContent = health.status === 'ok' ? 'HEALTHY' : 'DEGRADED';
      badge.className = health.status === 'ok' ? 'status status-ok' : 'status status-warn';
      document.getElementById('leader-info').textContent = 'Leader: ' + (health.leader || 'none');
      healthy = health.status === 'ok';
    }
    if (!healthy) { badge.className = 'status status-err'; badge.textContent = 'DOWN'; }

    // Nodes
    if (nodes) {
      document.getElementById('leader-addr').textContent = nodes.leader_address || nodes.leader || '-';
      const list = document.getElementById('node-list');
      const entries = nodes.nodes || [];
      document.getElementById('node-count').textContent = entries.length;
      let totalW = 0;
      list.innerHTML = entries.map(n => {
        totalW += n.total_workers || 0;
        return `<span class="node-chip ${n.status==='up'?'node-up':'node-down'}">${n.node_id} <small>${n.total_workers}w</small></span>`;
      }).join('') || '<span style="color:var(--muted)">No nodes</span>';
      document.getElementById('total-workers').textContent = totalW;
    }

    // Tenants
    if (tenants) {
      const arr = Object.values(tenants);
      document.getElementById('tenant-total').textContent = arr.length;
      let inflight = 0, pending = 0, recovery = 0, active = 0;
      arr.forEach(t => {
        const inf = t.inflight || 0;
        inflight += inf;
        if (inf > 0) active++;
      });
      document.getElementById('task-inflight').textContent = inflight;
      document.getElementById('task-pending').textContent = pending;
      document.getElementById('task-recovery').textContent = recovery;
      document.getElementById('tenant-active').textContent = active;
      document.getElementById('tenant-idle').textContent = arr.length - active;

      // Allocation bars
      if (allocs && allocs.nodes) {
        const maxW = {};
        arr.forEach(t => maxW[t.id] = t.max_workers);
        const totals = {};
        (allocs.nodes || []).forEach(na => {
          Object.entries(na.tenants || {}).forEach(([tid, cnt]) => {
            totals[tid] = (totals[tid] || 0) + cnt;
          });
        });
        document.getElementById('tenant-bars').innerHTML = Object.entries(totals)
          .sort((a,b) => b[1] - a[1])
          .map(([tid, cnt]) => {
            const max = maxW[tid] || cnt;
            const pct = Math.max(2, Math.round(cnt / Math.max(max, 1) * 100));
            const idle = cnt <= 1 && max > 1;
            return `<div class="tenant-row">
              <div class="name">${tid}${idle ? '<span class="tag tag-idle">idle</span>' : ''}</div>
              <div class="bar-wrap"><div class="tenant-bar"><div class="tenant-bar-fill${idle ? ' idle' : ''}" style="width:${pct}%"></div></div></div>
              <div class="count">${cnt} / ${max} workers</div>
            </div>`;
          }).join('') || '<span style="color:var(--muted)">No tenants configured</span>';
        if (Object.keys(totals).length === 0) {
          document.getElementById('tenant-bars').innerHTML = '<span style="color:var(--muted)">No tenants configured &mdash; add one below</span>';
        }
      }
    }

    document.getElementById('refresh-info').textContent = 'Updated ' + new Date().toLocaleTimeString();
  } catch(e) {
    setError('Cannot reach server &mdash; retrying...');
    const badge = document.getElementById('health-badge');
    badge.textContent = 'DOWN';
    badge.className = 'status status-err';
  }
}

async function addTenant() {
  const id = document.getElementById('new-tenant-id').value.trim();
  const name = document.getElementById('new-tenant-name').value.trim();
  const w = parseInt(document.getElementById('new-tenant-workers').value) || 50;
  if (!id) return alert('tenant-id required');
  try {
    await fetch(API + '/api/v1/admin/tenants/' + id, {
      method:'PUT', headers:{'Content-Type':'application/json'},
      body:JSON.stringify({name: name||id, max_workers:w})
    });
    refresh();
  } catch(e) { alert('Failed: ' + e.message); }
}

async function removeTenant() {
  const id = document.getElementById('new-tenant-id').value.trim();
  if (!id) return alert('tenant-id required');
  if (!confirm('Delete tenant ' + id + '?')) return;
  try {
    await fetch(API + '/api/v1/admin/tenants/' + id, { method:'DELETE' });
    refresh();
  } catch(e) { alert('Failed: ' + e.message); }
}

async function submitSample() {
  const id = document.getElementById('new-tenant-id').value.trim() || 'acme-corp';
  try {
    const r = await fetch(API + '/api/v1/tasks', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body:JSON.stringify({tenant_id:id, payload:'test-'+Date.now()})
    });
    if (r.ok) refresh();
  } catch(e) { alert('Failed: ' + e.message); }
}

refresh();
setInterval(refresh, 3000);
</script>
</body>
</html>
