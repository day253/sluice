<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sluice</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<style>
body{background:#f8f9fb;color:#1a1a2e;font-size:14px}
.navbar{box-shadow:0 1px 4px rgba(0,0,0,.06)}.navbar-brand{font-weight:700}
.badge-up{background:#d1fae5;color:#065f46}.badge-down{background:#fee2e2;color:#991b1b}
.badge-idle{background:#f1f5f9;color:#64748b}
.stat-val{font-size:24px;font-weight:700}.stat-lbl{font-size:11px;color:#6b7280;text-transform:uppercase}
.chart-wrap{position:relative;height:220px}
.tenant-row{cursor:pointer}.tenant-row:hover{background:#f0f4ff}
.timeline{max-height:150px;overflow-y:auto;font-size:12px}
</style>
</head>
<body>
<nav class="navbar bg-white border-bottom sticky-top">
  <div class="container-fluid">
    <span class="navbar-brand">&#9961; Sluice</span>
    <span id="badge" class="badge">...</span>
    <span class="ms-2 text-muted small" id="ldr"></span>
    <div class="ms-auto text-muted small"><span id="nid"></span> &middot; <span id="ts">--:--:--</span></div>
  </div>
</nav>
<div id="err" class="alert alert-warning rounded-0 m-0 text-center" style="display:none">Connecting...</div>

<div class="container-fluid px-4 py-3">
  <div class="row g-2 mb-3">
    <div class="col-4 col-md-2"><div class="card p-2 text-center"><div class="stat-lbl">Nodes</div><div class="stat-val text-primary" id="s-nodes">-</div></div></div>
    <div class="col-4 col-md-2"><div class="card p-2 text-center"><div class="stat-lbl">Workers</div><div class="stat-val text-primary" id="s-workers">-</div></div></div>
    <div class="col-4 col-md-2"><div class="card p-2 text-center"><div class="stat-lbl">Tenants</div><div class="stat-val" id="s-tenants">0</div></div></div>
    <div class="col-4 col-md-2"><div class="card p-2 text-center"><div class="stat-lbl">Inflight</div><div class="stat-val text-warning" id="s-inf">0</div></div></div>
    <div class="col-4 col-md-2"><div class="card p-2 text-center"><div class="stat-lbl">Refreshes</div><div class="stat-val text-success" id="s-tick">0</div></div></div>
  </div>

  <div class="row g-3 mb-3">
    <div class="col-md-6"><div class="card"><div class="card-body">
      <h6 class="text-muted text-uppercase small mb-2">Inflight Tasks <small id="inf-debug" class="text-success"></small></h6>
      <div class="chart-wrap"><canvas id="ch-inf"></canvas></div>
    </div></div></div>
    <div class="col-md-6"><div class="card"><div class="card-body">
      <h6 class="text-muted text-uppercase small mb-2">Worker Usage % <small id="usage-debug" class="text-success"></small></h6>
      <div class="chart-wrap"><canvas id="ch-usage"></canvas></div>
    </div></div></div>
  </div>

  <div class="row g-3 mb-3">
    <div class="col-md-7"><div class="card"><div class="card-body">
      <div class="d-flex align-items-center gap-2 mb-2">
        <h6 class="text-muted text-uppercase small mb-0">Tenants</h6>
        <button class="btn btn-sm btn-outline-secondary ms-auto" onclick="inj('all')">Random All</button>
        <input class="form-control form-control-sm" id="inj-n" type="number" value="50" min="1" max="500" style="width:70px">
        <button class="btn btn-sm btn-primary" onclick="inj('sel')">Inject</button>
      </div>
      <table class="table table-sm mb-0"><thead>
        <tr><th onclick="sortBy('name')">Name</th><th onclick="sortBy('max')">Max</th><th onclick="sortBy('used')">Used</th><th onclick="sortBy('rate')">Usage%</th><th>Inf</th><th></th></tr></thead>
        <tbody id="tlist"><tr><td colspan="6" class="text-muted">No tenants</td></tr></tbody></table>
      <div class="d-flex gap-2 mt-2">
        <input class="form-control form-control-sm" id="new-id" placeholder="tenant-id" style="max-width:120px">
        <input class="form-control form-control-sm" id="new-name" placeholder="name" style="max-width:120px">
        <input class="form-control form-control-sm" id="new-max" type="number" value="50" min="1" style="max-width:80px">
        <button class="btn btn-sm btn-primary" onclick="upsert()">Add/Update</button>
        <button class="btn btn-sm btn-outline-danger" onclick="del()">Delete</button>
        <button class="btn btn-sm btn-outline-secondary" onclick="inj('one',document.getElementById('new-id').value)">+Tasks</button>
      </div>
    </div></div></div>
    <div class="col-md-5"><div class="card"><div class="card-body">
      <h6 class="text-muted text-uppercase small mb-2">Activity</h6>
      <div class="timeline text-muted" id="tline">Waiting...</div>
    </div></div></div>
  </div>
</div>

<script>
const C=['#3b82f6','#10b981','#f59e0b','#ef4444','#8b5cf6','#ec4899'];
let H={inf:[],usage:{},labels:[],events:[]},charts={},ver=0,sortKey='rate',sortDir=-1,tick=0;

function initChart(id,label,color){
  if(typeof Chart==='undefined'){document.getElementById(id+'-debug').textContent=' CDN fail';return}
  const c=document.getElementById(id);if(!c)return;
  if(charts[id])charts[id].destroy();
  const ds=id==='ch-inf'?[{label,borderColor:color,backgroundColor:color+'15',borderWidth:2,pointRadius:0,tension:.4,fill:true,data:[]}]:[];
  charts[id]=new Chart(c,{type:'line',data:{labels:[],datasets:ds},
    options:{responsive:true,maintainAspectRatio:false,animation:false,
      scales:{y:{beginAtZero:true,grid:{color:'#f3f4f6'},ticks:{maxTicksLimit:5,font:{size:10}}},
        x:{grid:{display:false},ticks:{maxTicksLimit:8,font:{size:10}}}},
      plugins:{legend:{display:id==='ch-usage'}}}});
}

function updateInfChart(){
  const c=charts['ch-inf'];if(!c)return;
  const newData=H.inf.slice(-300);
  c.data.labels=H.labels.slice(-300);
  c.data.datasets[0].data=newData;
  c.update();
  document.getElementById('inf-debug').textContent=H.inf.length+'pts';
}

function updateUsageChart(totals){
  const c=charts['ch-usage'];if(!c)return;
  const tids=Object.keys(totals).sort((a,b)=>(totals[b]||0)-(totals[a]||0)).slice(0,6);
  if(!tids.length){c.data.datasets=[];c.update();document.getElementById('usage-debug').textContent='0 tenants';return}
  const existing={};c.data.datasets.forEach(ds=>{existing[ds.label]=ds});
  c.data.datasets=tids.map((tid,i)=>{
    const label=tid;
    const data=[...(H.usage[tid]||[])]; // clone array for change detection
    if(existing[label]){existing[label].data=data;return existing[label]}
    return{label,borderColor:C[i%C.length],backgroundColor:C[i%C.length]+'10',borderWidth:2,pointRadius:0,tension:.4,fill:false,data};
  });
  c.update();
  document.getElementById('usage-debug').textContent=tids.length+'t/'+(H.usage[tids[0]]||[]).length+'pts';
}

async function refresh(){
  try{
    const r=await Promise.allSettled([fetch('/api/v1/health'),fetch('/api/v1/admin/nodes'),fetch('/api/v1/admin/tenants'),fetch('/api/v1/admin/allocations')]);
    const [hr,nr,tr,ar]=r.map(x=>x.status==='fulfilled'?x.value:null);
    let h=null,n=null,t=null,a=null;
    try{if(hr&&hr.ok)h=await hr.json()}catch(e){}
    try{if(nr&&nr.ok)n=await nr.json()}catch(e){}
    try{if(tr&&tr.ok)t=await tr.json()}catch(e){}
    try{if(ar&&ar.ok)a=await ar.json()}catch(e){}
    if(!h&&!n&&!t&&!a){if(ver===0)document.getElementById('err').style.display='block';return}
    ver++;document.getElementById('err').style.display='none';
    tick++;document.getElementById('s-tick').textContent=tick;

    if(h){const ok=h.status==='ok';document.getElementById('badge').textContent=ok?'HEALTHY':'DOWN';document.getElementById('badge').className='badge '+(ok?'badge-up':'badge-down');document.getElementById('ldr').textContent=h.leader||'';document.getElementById('nid').textContent=h.node_id||''}
    const na=n&&n.nodes?n.nodes:[];let tw=0;na.forEach(x=>tw+=x.total_workers||0);
    document.getElementById('s-nodes').textContent=na.length;document.getElementById('s-workers').textContent=tw;
    const ta=t&&typeof t==='object'?Object.values(t):[];let inf=0;ta.forEach(x=>inf+=x.inflight||0);
    document.getElementById('s-tenants').textContent=ta.length;document.getElementById('s-inf').textContent=inf;

    const ts=new Date().toLocaleTimeString();
    H.labels.push(ts);if(H.labels.length>300)H.labels.shift();
    H.inf.push(inf);if(H.inf.length>300)H.inf.shift();

    const totals={};if(a&&a.nodes){a.nodes.forEach(na=>{Object.entries(na.tenants||{}).forEach(([tid,cnt])=>{totals[tid]=(totals[tid]||0)+cnt})})}
    Object.entries(totals).forEach(([tid,cnt])=>{if(!H.usage[tid])H.usage[tid]=[];const ti=ta.find(x=>x.id===tid)||{};const max=ti.max_workers||cnt;H.usage[tid].push(max>0?Math.round(cnt/max*100):0);if(H.usage[tid].length>300)H.usage[tid].shift()});

    updateInfChart();
    updateUsageChart(totals);

    // Tenant list
    const rows=ta.map(x=>{const used=totals[x.id]||0;return{id:x.id,name:x.name||x.id,max:x.max_workers||0,used,inf:x.inflight||0,rate:Math.round(used/Math.max(x.max_workers||1,1)*100)}});
    rows.sort((a,b)=>{const va=a[sortKey],vb=b[sortKey];return typeof va==='string'?sortDir*va.localeCompare(vb):sortDir*(va-vb)});
    document.getElementById('tlist').innerHTML=rows.map(r=>`<tr class="tenant-row" onclick="sel('${r.id}',${r.max})">
      <td><b>${r.id}</b>${r.rate<=1&&r.max>1?' <span class="badge badge-idle">i</span>':''}</td>
      <td>${r.max}</td><td>${r.used}</td>
      <td><div class="progress" style="height:16px"><div class="progress-bar" style="width:${r.rate}%;background:${r.rate>80?'#ef4444':r.rate>40?'#f59e0b':'#3b82f6'}">${r.rate}%</div></div></td>
      <td>${r.inf}</td><td><button class="btn btn-sm btn-outline-secondary" onclick="event.stopPropagation();inj('one','${r.id}')">+</button></td></tr>`).join('')||'<tr><td colspan="6" class="text-muted">No tenants</td></tr>';
    if(!H.events.length)H.events.unshift({time:ts,msg:'Connected'});while(H.events.length>30)H.events.pop();
    document.getElementById('tline').innerHTML=H.events.map(e=>`<div style="padding:2px 0;border-bottom:1px solid #f3f4f6"><b style="color:#9ca3af">${e.time}</b> ${e.msg}</div>`).join('');
    document.getElementById('ts').textContent=ts;
  }catch(e){if(ver===0)document.getElementById('err').style.display='block'}
}

async function loadHistory(){
  try{const r=await fetch('/api/v1/metrics');if(!r.ok)return;const data=await r.json();
    data.forEach(d=>{
      if(d.name==='inflight:total'){H.inf=d.secs.filter(x=>x>=0).slice(-300);H.labels=d.secs.map((_,i)=>new Date(Date.now()-(d.secs.length-i)*1000).toLocaleTimeString()).slice(-300)}
      else if(d.name.startsWith('alloc:')){const tid=d.name.replace('alloc:','');H.usage[tid]=d.secs.filter(x=>x>=0).slice(-200)}
    });
    if(H.inf.length){updateInfChart()}
    const totals={};Object.entries(H.usage).forEach(([tid,arr])=>{if(arr.length)totals[tid]=arr[arr.length-1]});
    if(Object.keys(totals).length){updateUsageChart(totals)}
  }catch(e){console.error('loadHistory:',e)}
}

function sel(id,max){document.getElementById('new-id').value=id;document.getElementById('new-max').value=max}
function sortBy(k){if(sortKey===k)sortDir*=-1;else{sortKey=k;sortDir=k==='name'?1:-1}refresh()}
async function upsert(){const id=document.getElementById('new-id').value.trim();if(!id)return alert('id required');const name=document.getElementById('new-name').value.trim()||id;const max=parseInt(document.getElementById('new-max').value)||50;await fetch('/api/v1/admin/tenants/'+id,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({name,max_workers:max})});H.events.unshift({time:new Date().toLocaleTimeString(),msg:'Upsert '+id});refresh()}
async function del(){const id=document.getElementById('new-id').value.trim();if(!id)return alert('id required');if(!confirm('Delete '+id+'?'))return;await fetch('/api/v1/admin/tenants/'+id,{method:'DELETE'});H.events.unshift({time:new Date().toLocaleTimeString(),msg:'Deleted '+id});refresh()}
async function inj(mode,tid){const n=parseInt(document.getElementById('inj-n').value)||50;let tids=[];if(mode==='all'){const r=await fetch('/api/v1/admin/tenants').then(r=>r.json()).catch(()=>{});tids=r?Object.keys(r):[]}else if(tid)tids=[tid];else{const id=document.getElementById('new-id').value.trim();tids=id?[id]:[]}if(!tids.length)return alert('No tenants');for(let i=0;i<n;i++){const t=tids[Math.floor(Math.random()*tids.length)];fetch('/api/v1/tasks',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({tenant_id:t,payload:'auto-'+Date.now()+'-'+i})}).catch(()=>{})}H.events.unshift({time:new Date().toLocaleTimeString(),msg:'Injected '+n+' tasks'});setTimeout(refresh,1500)}

(function start(){
  initChart('ch-inf','Inflight','#f59e0b');
  initChart('ch-usage','Usage %','#3b82f6');
  loadHistory().then(()=>{refresh();setInterval(refresh,3000)});
})();
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
