syntax = "proto3";

package sluice.v1;

option go_package = "github.com/day253/sluice/pkg/grpc/v1;grpcv1";

// ---------------------------------------------------------------------------
// Sluice — external API (all unary, no streaming)
// ---------------------------------------------------------------------------

service Sluice {
  // Submit a task.  Returns immediately with task_id + status=pending.
  rpc Submit(SubmitRequest) returns (SubmitResponse);

  // Submit multiple tasks in one Raft log entry. Returns one pending result
  // per input task in the same order.
  rpc SubmitBatch(SubmitBatchRequest) returns (SubmitBatchResponse);

  // Get the current status of a task.
  rpc GetTask(GetTaskRequest) returns (TaskStatus);

  // Wait for a task to complete (blocking).  Returns the final status
  // or DeadlineExceeded on timeout.
  rpc WaitTask(WaitTaskRequest) returns (TaskStatus);

  // Admin: upsert a tenant configuration.
  rpc UpsertTenant(UpsertTenantRequest) returns (UpsertTenantResponse);

  // Admin: delete a tenant.
  rpc DeleteTenant(DeleteTenantRequest) returns (DeleteTenantResponse);

  // Admin: list all tenants with inflight counts.
  rpc ListTenants(ListTenantsRequest) returns (ListTenantsResponse);

  // Admin: cluster nodes and allocations.
  rpc ClusterStatus(ClusterStatusRequest) returns (ClusterStatusResponse);

  // Health check.
  rpc Health(HealthRequest) returns (HealthResponse);
}

// ---------------------------------------------------------------------------
// Messages
// ---------------------------------------------------------------------------

message SubmitRequest {
  string tenant_id       = 1;
  bytes  payload         = 2;
  string idempotency_key = 3;
}

message SubmitResponse {
  string task_id   = 1;
  string tenant_id = 2;
  string status    = 3;  // always "pending" on submit
}

message SubmitBatchRequest {
  repeated SubmitRequest tasks = 1;
}

message SubmitBatchResponse {
  repeated SubmitResponse tasks = 1;
}

message GetTaskRequest {
  string task_id = 1;
}

message TaskStatus {
  string task_id   = 1;
  string tenant_id = 2;
  string status    = 3;  // "pending", "inflight", "done", "failed"
  string result    = 4;
  string error     = 5;
}

message WaitTaskRequest {
  string task_id         = 1;
  int32  timeout_seconds = 2;  // 0 = default (30s)
}

message UpsertTenantRequest {
  string tenant_id   = 1;
  string name        = 2;
  int32  max_workers = 3;
}

message UpsertTenantResponse {
  bool ok = 1;
}

message DeleteTenantRequest {
  string tenant_id = 1;
}

message DeleteTenantResponse {
  bool ok = 1;
}

message ListTenantsRequest {}

message TenantInfo {
  string tenant_id   = 1;
  string name        = 2;
  int32  max_workers = 3;
  int32  inflight    = 4;
}

message ListTenantsResponse {
  repeated TenantInfo tenants = 1;
}

message ClusterStatusRequest {}

message NodeInfo {
  string node_id       = 1;
  string address       = 2;
  string raft_address  = 3;
  string status        = 4;
  int32  total_workers = 5;
}

message TenantAllocation {
  string tenant_id = 1;
  int32  workers   = 2;
}

message NodeAllocation {
  string node_id = 1;
  repeated TenantAllocation tenants = 2;
}

message ClusterStatusResponse {
  repeated NodeInfo       nodes       = 1;
  repeated NodeAllocation allocations = 2;
  string leader_address              = 3;
}

message HealthRequest {}

message HealthResponse {
  string status  = 1;
  string node_id = 2;
  string leader  = 3;
}
