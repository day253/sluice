syntax = "proto3";

package sluice.internal.v1;

option go_package = "github.com/day253/sluice/pkg/grpc/v1;grpcv1";

// ---------------------------------------------------------------------------
// SluiceInternal — node-to-node streaming for high throughput
//
// Worker nodes connect to the leader. AssignmentStream is the primary
// scheduling path; ClaimStream remains for rolling-upgrade compatibility.
// ---------------------------------------------------------------------------

service SluiceInternal {
  // ClaimStream is the legacy rolling-upgrade path. Older workers send
  // concrete claim requests; the leader accumulates them for a configurable
  // batch window (default 5 ms), then commits one Raft log entry.
  //
  // This reduces Raft Apply calls from O(tasks) to O(batches).
  rpc ClaimStream(stream ClaimRequest) returns (stream ClaimBatch);

  // AssignmentStream is the leader-owned scheduling path. Each idle worker
  // reports one free execution slot and its preferred tenant. The leader
  // batches requests, selects distinct pending tasks, commits one ClaimBatch
  // Raft entry, and only then returns executable task payloads.
  rpc AssignmentStream(stream AssignmentRequest) returns (stream AssignmentBatch);

  // ResultStream batches task completions.  Workers stream completion
  // events to the leader, which commits them as a single Raft entry per
  // batch window.
  rpc ResultStream(stream ResultRequest) returns (stream ResultBatch);

  // AllocationPush replaces polling.  Nodes subscribe and the leader
  // pushes allocation plans whenever they change.
  rpc AllocationPush(AllocationSubscribe) returns (stream AllocationPlan);
}

// ---------------------------------------------------------------------------
// ClaimStream
// ---------------------------------------------------------------------------

message ClaimRequest {
  string task_id   = 1;
  string tenant_id = 2;
  string node_id   = 3;
  bytes  payload   = 4;
  bool   steal     = 5;  // true when an idle worker claims an aged task for another tenant
}

message ClaimBatch {
  repeated string task_ids    = 1;  // successfully claimed
  repeated string failed_ids  = 2;  // already claimed by another node
}

// ---------------------------------------------------------------------------
// AssignmentStream
// ---------------------------------------------------------------------------

message AssignmentRequest {
  string request_id          = 1;
  string node_id             = 2;
  string preferred_tenant_id = 3;
}

message AssignedTask {
  string request_id   = 1;
  string task_id      = 2;
  string tenant_id    = 3;
  bytes  payload      = 4;
  string queue_node_id = 5;
}

message AssignmentBatch {
  repeated AssignedTask tasks          = 1;
  repeated string empty_request_ids    = 2;
}

// ---------------------------------------------------------------------------
// ResultStream
// ---------------------------------------------------------------------------

message ResultRequest {
  string task_id   = 1;
  string tenant_id = 2;
  string status    = 3;  // "done" or "failed"
  string result    = 4;
  string error     = 5;
}

message ResultBatch {
  repeated string committed_ids = 1;
}

// ---------------------------------------------------------------------------
// AllocationPush
// ---------------------------------------------------------------------------

message AllocationSubscribe {
  string node_id = 1;  // which node is subscribing
}

message TenantWorkerCount {
  string tenant_id = 1;
  int32  workers   = 2;
}

message AllocationPlan {
  string node_id = 1;  // which node this allocation is for
  repeated TenantWorkerCount tenants = 2;
}
