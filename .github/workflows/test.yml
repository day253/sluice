name: Test

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - name: Build
        run: go build ./...

      - name: Unit Tests
        run: go test -v -race -count=1 ./api/... ./charts/... ./cmd/... ./internal/... ./pkg/...

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - name: Integration Tests
        run: go test -v -race -count=1 -timeout 600s ./test/integration/

  bench:
    name: Benchmarks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - name: Allocator bench
        run: go test -run '^$' -bench=. -benchtime=200ms -benchmem ./pkg/allocator/

      - name: FSM bench
        run: go test -run '^$' -bench=. -benchtime=200ms -benchmem ./pkg/raft/

      - name: Queue bench
        run: go test -run '^$' -bench=. -benchtime=200ms -benchmem ./pkg/queue/

      - name: Worker bench
        run: go test -run '^$' -bench=. -benchtime=200ms -benchmem ./pkg/worker/
